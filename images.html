<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Customer Images • SLM Garden Maintenance</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="logo" aria-label="Go to home page">
          <img src="assets/slm-logo.png" alt="SLM Garden Maintenance logo" class="site-logo" />
        </a>
        <nav class="nav">
          <a href="index.html#services">Services</a>
          <a href="index.html#about">About</a>
          <a href="contact.html" class="nav-cta">Get a Quote</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container">
          <h2 class="section-title">Images from previous customers</h2>
          <p class="section-intro about-summary">
            A look at some of our recent garden maintenance work.
          </p>
          <div class="image-carousel image-carousel--page" data-carousel>
            <div class="image-carousel-inner">
              <button
                type="button"
                class="carousel-arrow carousel-arrow--prev"
                aria-label="Previous image"
              >
                ‹
              </button>
              <div class="carousel-frame">
                <figure class="carousel-slide is-active">
                  <img
                    src="assets/IMG_4486-001adc9c-b337-4fd5-adc2-8682638aba3a.png"
                    alt="Well-maintained striped lawn from a recent customer"
                  />
                </figure>
                <figure class="carousel-slide">
                  <img
                    src="Image 01-04-2026 at 16.03.jpg"
                    alt="Garden maintenance work from a recent customer"
                  />
                </figure>
              </div>
              <button
                type="button"
                class="carousel-arrow carousel-arrow--next"
                aria-label="Next image"
              >
                ›
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© 2026 SLM Garden Maintenance. All rights reserved.</p>
        <a href="#top" class="back-to-top">Back to top ↑</a>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
  </html>
